<!DOCTYPE html>
<html>
<head>

    <title>Create Account</title>
</head>

<!-- main body of create account page-->
<body class="body2">

    <div class="create-account-allign"> 
        <h1 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Create Account</h1>
    </div>

    <div class="create-account-allign"> 
        <p> Username: </p>
        <input type="text" id="createUsername">
    </div>
    
    <div class="create-account-allign"> 
        <p> Password: </p>
        <input type="password" id="createPassword">
    </div>

    <div class="create-account-allign top-space">
        <button id="createAccountBtn">
            Create Account
        </button>
    </div>

    <div>
        <img src="images/createAccount.webp">
    </div>

</body>
<script src="create.js"></script>

</html>
